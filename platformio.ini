[env]
lib_deps =
    fastled/FastLED@^3.9.14

[env:local]
platform = native
test_framework = googletest
build_flags =
    -std=gnu++2a

[env:esp32]
platform = https://github.com/platformio/platform-espressif32.git
board = esp32-s3-devkitm-1
framework = arduino
test_framework = googletest

build_unflags =
    -std=gnu++11

build_flags =
    -std=gnu++2a
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1