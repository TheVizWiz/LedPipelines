[env:local]
platform = native
test_framework = googletest
; env:local uses the native stubs in test/mocks instead of the real (hardware) FastLED. Ignore the FastLED dependency
; declared in library.json so the LDF doesn't fetch/compile it (the test_framework include paths still get wired up).
lib_ignore = FastLED
lib_compat_mode = off
; Compile the library sources (src/) into the test build so the test links against the real implementation, not just
; the headers. Without this PlatformIO treats src/ as an unbuilt library and leaves its symbols undefined.
test_build_src = true
build_flags =
    ; needed for googletest + some QOL features (nested namespaces, etc).
    -std=c++17
    ; Put the native FastLED/Arduino stubs (test/mocks) on the include path so the library's #include "FastLED.h"
    ; and "Arduino.h" resolve to the host stubs when building for env:local.
    -I test/mocks
    -I include
; Exclude main.cpp from the native build: it registers real FastLED chipsets (addLeds<WS2812B, ...>) the stub doesn't
; model, and it defines setup()/loop() which the test harness supplies instead.
build_src_filter =
    +<*>
    -<main.cpp>

[env:esp32]
platform = https://github.com/platformio/platform-espressif32.git
board = esp32-s3-devkitm-1
framework = arduino
test_framework = googletest

lib_deps =
    fastled/FastLED@^3.9.14

build_unflags =
    -std=gnu++11

build_flags =
    -std=gnu++2a
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1